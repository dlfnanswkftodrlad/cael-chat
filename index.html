<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cael</title>
</head>
<body>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Noto Sans KR',sans-serif}
:root{--bg:#0A0A0A;--s1:#111;--s2:#161616;--s3:#1E1E1E;--ink:#E8E8E8;--dim:#666;--border:#252525;--gold:#E3C27E;--sidebar:220px}
html,body{height:100%}
body{background:var(--bg)}
#wrap{display:flex;width:100vw;height:100vh;background:var(--bg);overflow:hidden}

.scr{display:none;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.scr.on{display:flex}

#nick-scr{background:var(--bg)}
.n-logo svg{width:60px;height:60px}
.n-title{font-size:26px;font-weight:600;color:#fff;letter-spacing:1px}
.n-sub{font-size:13px;color:var(--dim)}
.n-inp{background:var(--s2);border:1px solid var(--border);border-radius:999px;padding:12px 20px;font-size:14px;color:var(--ink);outline:none;width:260px;text-align:center}
.n-inp::placeholder{color:var(--dim)}
.n-inp:focus{border-color:#3a3a3a}
.n-btn{background:var(--gold);color:#0a0a0a;border:none;border-radius:999px;padding:11px 32px;font-size:14px;font-weight:600;cursor:pointer;width:260px}
.n-btn:hover{opacity:.85}

#main-scr{display:none;flex-direction:row;align-items:stretch}
#main-scr.on{display:flex}

.sb{width:var(--sidebar);background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;height:100%}
.sb-top{padding:14px 12px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:8px}
.brand svg{width:28px;height:28px}
.brand-name{font-size:18px;font-weight:600;color:#fff;letter-spacing:1px}
.new-btn{margin:10px 10px 6px;background:var(--s3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--ink);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;width:calc(100% - 20px)}
.new-btn:hover{background:#252525}
.new-btn i{font-size:15px}
.chat-list{flex:1;overflow-y:auto;padding:6px 8px}
.chat-list::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.cl-label{font-size:10px;color:var(--dim);padding:6px 6px 3px;letter-spacing:.5px;text-transform:uppercase}
.cl-item{padding:8px 9px;border-radius:6px;font-size:12px;color:#888;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.cl-item:hover{background:var(--s3);color:var(--ink)}
.cl-item.act{background:var(--s3);color:#ddd}
.sb-foot{border-top:1px solid var(--border);padding:6px 8px}
.sb-row{display:flex;align-items:center;gap:8px;padding:9px 8px;border-radius:7px;font-size:13px;color:#888;cursor:pointer}
.sb-row:hover{background:var(--s3);color:var(--ink)}
.sb-row i{font-size:16px}
.av{width:24px;height:24px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#ccc;flex-shrink:0}

.chat-panel{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden}
.ch-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ch-title{font-size:14px;color:#888}
.del-btn{background:none;border:1px solid var(--border);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim)}
.del-btn:hover{background:var(--s3);color:var(--ink)}
.del-btn i{font-size:15px}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
.empty svg{width:40px;height:40px;opacity:.25}
.empty-txt{font-size:13px;color:var(--dim)}
.msg{max-width:78%;padding:9px 13px;border-radius:13px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.bot{align-self:flex-start;background:var(--s2);border:1px solid var(--border);color:var(--ink);border-bottom-left-radius:3px}
.msg.user{align-self:flex-end;background:#1f1f1f;border:1px solid #2e2e2e;color:#fff;border-bottom-right-radius:3px}
.msg.err{align-self:flex-start;background:#180808;border:1px solid #3a1a1a;color:#c66;border-bottom-left-radius:3px}
.typing{align-self:flex-start;background:var(--s2);border:1px solid var(--border);padding:11px 14px;border-radius:13px;border-bottom-left-radius:3px;display:flex;gap:4px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--dim);animation:bp 1.2s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bp{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-4px);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 10px;flex-shrink:0}
.chip{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--s2);color:#888;cursor:pointer}
.chip:hover{background:var(--s3);color:var(--ink);border-color:#333}
.inp-bar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--s1);flex-shrink:0}
.inp-bar input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:999px;padding:10px 16px;font-size:14px;color:var(--ink);outline:none}
.inp-bar input:focus{border-color:#333}
.inp-bar input::placeholder{color:var(--dim)}
.send{width:40px;height:40px;border-radius:50%;border:none;background:var(--gold);color:#0a0a0a;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send:hover{opacity:.85}
.send:disabled{opacity:.35;cursor:default}
.send i{font-size:17px}

.modal-wrap{display:none;position:absolute;inset:0;background:rgba(0,0,0,.75);align-items:center;justify-content:center;z-index:50;border-radius:0}
.modal-wrap.on{display:flex}
.modal{background:#141414;border:1px solid var(--border);border-radius:12px;padding:22px;width:280px}
.modal h3{font-size:16px;color:#fff;margin-bottom:14px;font-weight:500}
.close-x{float:right;background:none;border:none;color:var(--dim);cursor:pointer;font-size:20px;line-height:1;margin-top:-2px}
.m-av{width:52px;height:52px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#ddd;margin:0 auto 10px}
.m-name{text-align:center;font-size:14px;color:var(--ink);margin-bottom:3px}
.m-sub{text-align:center;font-size:11px;color:var(--dim);margin-bottom:16px}
.m-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--border);font-size:13px;color:#888}
.m-inp{width:100%;background:#1c1c1c;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--ink);outline:none;margin-top:6px}
.m-btns{display:flex;gap:8px;margin-top:14px}
.m-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:#1c1c1c;color:var(--ink);font-size:13px;cursor:pointer}
.m-btn:hover{opacity:.8}
.m-btn.red{background:#180808;border-color:#3a1a1a;color:#c66}
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<div id="wrap" style="position:relative">

  <div id="nick-scr" class="scr on">
    <div class="n-logo"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="22" fill="#0A0A0A"/><g fill="#FFF"><ellipse cx="50" cy="27" rx="7" ry="20"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(60 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(120 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(180 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(240 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(300 50 50)"/><circle cx="50" cy="50" r="6"/></g></svg></div>
    <div class="n-title">Cael</div>
    <div class="n-sub">닉네임을 정해줘!</div>
    <input class="n-inp" id="n-inp" placeholder="닉네임 입력..." maxlength="16" autocomplete="off"/>
    <button class="n-btn" id="n-btn">시작하기</button>
  </div>

  <div id="main-scr" class="scr">
    <div class="sb">
      <div class="sb-top">
        <div class="brand">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="22" fill="#0A0A0A"/><g fill="#FFF"><ellipse cx="50" cy="27" rx="7" ry="20"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(60 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(120 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(180 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(240 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(300 50 50)"/><circle cx="50" cy="50" r="6"/></g></svg>
          <span class="brand-name">Cael</span>
        </div>
      </div>
      <button class="new-btn" id="new-btn"><i class="ti ti-plus" aria-hidden="true"></i>새 채팅</button>
      <div class="chat-list" id="cl">
        <div class="cl-label">최근 대화</div>
      </div>
      <div class="sb-foot">
        <div class="sb-row" id="acc-btn">
          <div class="av" id="sb-av">?</div>
          <span id="sb-nick">-</span>
        </div>
        <div class="sb-row" id="lo-btn">
          <i class="ti ti-logout" aria-hidden="true"></i>
          <span>로그아웃</span>
        </div>
      </div>
    </div>

    <div class="chat-panel">
      <div class="ch-head">
        <span class="ch-title" id="ch-title">새 채팅</span>
        <button class="del-btn" id="del-btn" aria-label="대화 삭제"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
      <div class="msgs" id="msgs"></div>
      <div class="chips" id="chips">
        <button class="chip">너는 뭘 할 수 있어?</button>
        <button class="chip">오늘 기분이 좀 그래</button>
        <button class="chip">재밌는 이야기 해줘</button>
        <button class="chip">엑셀 함수 알려줘</button>
      </div>
      <div class="inp-bar">
        <input id="inp" type="text" placeholder="무엇이든 물어보세요..." autocomplete="off"/>
        <button class="send" id="send-btn"><i class="ti ti-send" aria-hidden="true"></i></button>
      </div>
    </div>
  </div>

  <div class="modal-wrap" id="mod">
    <div class="modal">
      <button class="close-x" id="mod-x">&times;</button>
      <h3>계정</h3>
      <div class="m-av" id="mod-av">?</div>
      <div class="m-name" id="mod-name">-</div>
      <div class="m-sub">Cael 사용자</div>
      <div class="m-row"><span>총 대화 수</span><span id="mod-cnt">0</span></div>
      <div class="m-row" style="flex-direction:column;align-items:flex-start;gap:4px">
        <span>닉네임 변경</span>
        <input class="m-inp" id="mod-inp" placeholder="새 닉네임..." maxlength="16"/>
      </div>
      <div class="m-btns">
        <button class="m-btn" id="mod-save">저장</button>
        <button class="m-btn red" id="mod-lo">로그아웃</button>
      </div>
    </div>
  </div>
</div>

<script>
const SYS=`당신의 이름은 'Cael'입니다. 친근하고 다정한 만능 AI 비서입니다. 쉽고 일상적인 말로 핵심만 짧게 설명해주세요. 친근한 반존댓말로 대답하고 필요하면 이모지를 써도 좋습니다.`;
let nick='',sess=[],cur=0;
const gi=n=>n?n[0].toUpperCase():'?';
const $=id=>document.getElementById(id);

function showMain(){
  $('nick-scr').classList.remove('on');
  $('main-scr').classList.add('on');
  $('sb-nick').textContent=nick;
  $('sb-av').textContent=gi(nick);
  newSess();
}

function newSess(){
  const s={id:Date.now(),title:'새 채팅',hist:[],msgs:[]};
  sess.unshift(s);cur=0;
  renderList();renderMsgs();updateTitle();
}

function renderList(){
  const el=$('cl');
  el.innerHTML='<div class="cl-label">최근 대화</div>';
  sess.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='cl-item'+(i===cur?' act':'');
    d.textContent=s.title;
    d.onclick=()=>{cur=i;renderList();renderMsgs();updateTitle();};
    el.appendChild(d);
  });
}

function updateTitle(){
  $('ch-title').textContent=sess[cur]?sess[cur].title:'새 채팅';
}

function renderMsgs(){
  const el=$('msgs');
  const s=sess[cur];
  el.innerHTML='';
  if(!s||!s.msgs.length){
    el.innerHTML=`<div class="empty"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" rx="22" fill="#0A0A0A"/><g fill="#FFF"><ellipse cx="50" cy="27" rx="7" ry="20"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(60 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(120 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(180 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(240 50 50)"/><ellipse cx="50" cy="27" rx="7" ry="20" transform="rotate(300 50 50)"/><circle cx="50" cy="50" r="6"/></g></svg><div class="empty-txt">${nick?'안녕 '+nick+'! 무엇이든 물어봐 ✨':'무엇이든 물어봐!'}</div></div>`;
    $('chips').style.display='flex';
  } else {
    $('chips').style.display='none';
    s.msgs.forEach(m=>{
      const d=document.createElement('div');
      d.className='msg '+m.r;
      d.textContent=m.t;
      el.appendChild(d);
    });
    el.scrollTop=el.scrollHeight;
  }
}

function addMsg(r,t){
  const s=sess[cur];if(!s)return;
  s.msgs.push({r,t});
  if(r==='user'&&s.msgs.filter(m=>m.r==='user').length===1){
    s.title=t.slice(0,18)+(t.length>18?'…':'');
    updateTitle();renderList();
  }
  $('chips').style.display='none';
  const e=$('msgs').querySelector('.empty');
  if(e)e.remove();
  const d=document.createElement('div');
  d.className='msg '+r;d.textContent=t;
  $('msgs').appendChild(d);
  $('msgs').scrollTop=$('msgs').scrollHeight;
}

function showTyp(){
  const d=document.createElement('div');
  d.className='typing';d.id='typ';
  d.innerHTML='<span></span><span></span><span></span>';
  $('msgs').appendChild(d);$('msgs').scrollTop=$('msgs').scrollHeight;
}
function hideTyp(){const e=$('typ');if(e)e.remove();}

async function send(txt){
  const t=(txt!==undefined?txt:$('inp').value).trim();
  if(!t)return;
  if(!sess.length)newSess();
  const s=sess[cur];
  addMsg('user',t);
  s.hist.push({role:'user',content:t});
  $('inp').value='';$('send-btn').disabled=true;
  showTyp();
  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYS,messages:s.hist})
    });
    const data=await res.json();
    if(!res.ok||data.error)throw new Error(data.error?.message||'오류 '+res.status);
    const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim()||'다시 물어봐 줄래?';
    hideTyp();addMsg('bot',reply);
    s.hist.push({role:'assistant',content:reply});
  }catch(e){
    hideTyp();addMsg('err','오류: '+e.message);s.hist.pop();
  }finally{
    $('send-btn').disabled=false;$('inp').focus();
  }
}

$('n-btn').onclick=()=>{const v=$('n-inp').value.trim();if(!v)return;nick=v;showMain();};
$('n-inp').onkeydown=e=>{if(e.key==='Enter')$('n-btn').click();};
$('new-btn').onclick=newSess;
$('send-btn').onclick=()=>send();
$('inp').onkeydown=e=>{if(e.key==='Enter')send();};
$('chips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>send(c.textContent));
$('del-btn').onclick=()=>{
  if(!sess.length)return;
  sess.splice(cur,1);
  if(!sess.length)newSess();
  else{cur=Math.min(cur,sess.length-1);renderList();renderMsgs();updateTitle();}
};
$('acc-btn').onclick=()=>{
  $('mod-av').textContent=gi(nick);
  $('mod-name').textContent=nick;
  $('mod-cnt').textContent=sess.filter(s=>s.msgs.length>0).length;
  $('mod-inp').value='';
  $('mod').classList.add('on');
};
$('mod-x').onclick=()=>$('mod').classList.remove('on');
$('mod').onclick=e=>{if(e.target===$('mod'))$('mod').classList.remove('on');};
$('mod-save').onclick=()=>{
  const v=$('mod-inp').value.trim();
  if(v){nick=v;$('sb-nick').textContent=v;$('sb-av').textContent=gi(v);}
  $('mod').classList.remove('on');
};
function logout(){nick='';sess=[];cur=0;$('mod').classList.remove('on');$('main-scr').classList.remove('on');$('nick-scr').classList.add('on');$('n-inp').value='';}
$('lo-btn').onclick=logout;$('mod-lo').onclick=logout;
</script>

</body>
</html>
